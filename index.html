<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Security headers are set via HTTP headers in netlify.toml -->
  <!-- Note: frame-ancestors and X-Frame-Options only work as HTTP headers -->

  <link rel="dns-prefetch" href="https://htamokfphaqudeivpowr.supabase.co" />
  <link rel="preconnect" href="https://htamokfphaqudeivpowr.supabase.co" crossorigin />

  <link rel="icon" type="image/ico" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
  <meta name="description" content="A minimal and intuitive expense tracker that helps you manage your finances" />

  <!-- Web App Manifest (standard) -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Apple iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Favicon for modern browsers -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512x512.png" />

  <title>Budgard - Expense Tracker</title>
  
  <!-- Theme initialization script - runs before page render to prevent flash -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      const root = document.documentElement;
      root.setAttribute('data-theme', savedTheme);
      if (savedTheme === 'dark') {
        root.classList.add('dark');
      }
    })();
  </script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
